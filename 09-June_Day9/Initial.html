<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pattern Output</title>
  </head>
  <body>
    <h2>Pattern of Initial (A)</h2>
    <pre id="pattern"></pre>

    <script>
      const pre = document.getElementById("pattern");
      const n = 5;

      for (let i = 0; i < n; i++) {
        let str = "";
        for (let j = 0; j < 2 * n - 1; j++) {
          if (
            j == n - 1 - i ||
            j == n - 1 + i ||
            (i == 2 && j > n - 1 - i && j < n - 1 + i)
          ) {
            str += "*";
          } else {
            str += " ";
          }
        }
        pre.textContent += str + "\n";
      }
    </script>
  </body>
</html>
